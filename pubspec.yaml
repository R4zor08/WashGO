name: washgo
description: "WashGo: Car Wash Booking & Queue Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  qr_flutter: ^4.1.0
  provider: ^6.1.2
  image_picker: ^1.1.2
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.5
  path: ^1.9.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  file_picker: ^8.1.7
  pdf: ^3.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: "#020B14"
  adaptive_icon_foreground: assets/images/logo.png
  windows:
    generate: true
    image_path: assets/images/logo.png

flutter_native_splash:
  color: "#020B14"
  image: assets/images/logo.png
  android: true
  android_12:
    color: "#020B14"
    image: assets/images/logo.png
  ios: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
